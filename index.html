<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inov-action Menuiserie - Contact</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #111;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 90%;
        max-width: 500px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        box-sizing: border-box;
    }

    .logo {
        display: block;
        margin: 0 auto 20px;
        max-width: 150px;
        height: auto;
    }

    h2 {
        text-align: center;
        color: #ff7a00;
    }

    label {
        margin-top: 10px;
        display: block;
        font-weight: bold;
    }

    input, textarea, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background-color: #ff7a00;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background-color: #e56b00;
    }

    /* Pour mobile très petit écran */
    @media (max-width: 400px) {
        .container {
            margin: 20px;
            padding: 15px;
        }
        button {
            padding: 10px;
            font-size: 14px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <!-- Mets ton logo dans le même dossier sous le nom logo.png -->
    <img src="logo.png" alt="Logo Inov-action" class="logo">

    <h2>Demande de rendez-vous</h2>

    <form action="https://formspree.io/f/xwvrypro" method="POST">

        <label>Civilité</label>
        <select name="civilite" required>
            <option value="">-- Choisir --</option>
            <option value="Monsieur">Monsieur</option>
            <option value="Madame">Madame</option>
        </select>

        <label>Prénom</label>
        <input type="text" name="prenom" required>

        <label>Nom</label>
        <input type="text" name="nom" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Téléphone</label>
        <input type="tel" name="telephone" required>

        <label>Adresse</label>
        <input type="text" name="adresse" required>

        <label>Demande précise</label>
        <textarea name="demande" rows="4" required></textarea>

        <label>Créneau souhaité</label>
        <input type="datetime-local" name="rdv">

        <!-- Sujet du mail -->
        <input type="hidden" name="_subject" value="Nouvelle demande client - Inov-action">

        <!-- Anti-spam -->
        <input type="text" name="_gotcha" style="display:none">

        <button type="submit">Envoyer la demande</button>

    </form>

</div>

</body>
</html>
